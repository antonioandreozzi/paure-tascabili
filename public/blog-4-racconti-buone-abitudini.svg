<svg viewBox="0 0 1024 576" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="sky7" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8B1A1A"/>
      <stop offset="50%" stop-color="#3D2B4F"/>
      <stop offset="100%" stop-color="#B8860B"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="576" fill="url(#sky7)"/>
  <!-- 4 icon cards -->
  <g>
    <rect x="80" y="120" width="190" height="190" rx="14" fill="#15101c" opacity="0.55"/>
    <rect x="300" y="120" width="190" height="190" rx="14" fill="#15101c" opacity="0.55"/>
    <rect x="520" y="120" width="190" height="190" rx="14" fill="#15101c" opacity="0.55"/>
    <rect x="740" y="120" width="190" height="190" rx="14" fill="#15101c" opacity="0.55"/>
  </g>
  <!-- dish stack -->
  <g transform="translate(175,215)" fill="#E8D5B0">
    <ellipse cx="0" cy="20" rx="38" ry="10"/>
    <ellipse cx="0" cy="2" rx="38" ry="10"/>
    <ellipse cx="0" cy="-16" rx="38" ry="10"/>
  </g>
  <!-- diary -->
  <g transform="translate(395,215)" fill="#E8D5B0">
    <rect x="-30" y="-38" width="60" height="76" rx="4"/>
    <line x1="-18" y1="-18" x2="18" y2="-18" stroke="#3D2B4F" stroke-width="3"/>
    <line x1="-18" y1="0" x2="18" y2="0" stroke="#3D2B4F" stroke-width="3"/>
    <line x1="-18" y1="18" x2="10" y2="18" stroke="#3D2B4F" stroke-width="3"/>
  </g>
  <!-- pocket watch -->
  <g transform="translate(615,215)" fill="none" stroke="#E8D5B0" stroke-width="6">
    <circle cx="0" cy="0" r="36"/>
    <line x1="0" y1="0" x2="0" y2="-20"/>
    <line x1="0" y1="0" x2="14" y2="8"/>
    <line x1="0" y1="-44" x2="0" y2="-36"/>
  </g>
  <!-- toothbrush -->
  <g transform="translate(835,215)" fill="#E8D5B0">
    <rect x="-6" y="-40" width="12" height="60" rx="6"/>
    <rect x="-16" y="-46" width="32" height="14" rx="6"/>
  </g>
  <text x="512" y="540" text-anchor="middle" font-family="Georgia, serif" font-size="24" fill="#E8D5B0" letter-spacing="2">4 Racconti sulle Buone Abitudini</text>
</svg>
